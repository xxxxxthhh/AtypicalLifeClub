<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究报告</title>
    <link rel="stylesheet" href="/invest/theme-adapter.css">
    <link rel="stylesheet" href="/invest/styles.css">
    <link rel="stylesheet" href="/invest/research/report-style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header class="shell-header">
        <div class="shell-header-inner">
            <div class="shell-brand">
                <div class="shell-brand-title shell-breadcrumb" aria-label="Breadcrumb">
                    <a class="shell-breadcrumb-link" href="/invest/">Invest</a>
                    <span class="shell-breadcrumb-separator">/</span>
                    <a class="shell-breadcrumb-link" href="/invest/research/">Research</a>
                    <span class="shell-breadcrumb-separator">/</span>
                    <span class="shell-breadcrumb-current" aria-current="page">Report</span>
                </div>
                <span class="shell-brand-subtitle">Report Detail</span>
            </div>
            <nav class="shell-nav">
                <a href="/invest/">返回 Invest</a>
                <a href="/invest/research/" class="active">Research</a>
                <a href="/invest/currency/">Currency</a>
                <a href="/invest/metals/">Metals</a>
            </nav>
        </div>
    </header>

    <main class="shell report-layout">
        <aside class="toc-panel">
            <div class="toc-header" id="tocHeader">研究模块</div>
            <nav id="tableOfContents"></nav>
            <button class="button" onclick="window.print()">打印报告</button>
        </aside>

        <article class="report-panel">
            <header class="report-hero">
                <div class="report-hero-controls">
                    <div class="report-badge">个人研究笔记</div>
                    <div class="switch-group">
                        <div class="language-switch" id="languageSwitch" role="group" aria-label="Language switch">
                            <button class="lang-btn" type="button" data-lang="zh">中文</button>
                            <button class="lang-btn" type="button" data-lang="en">EN</button>
                        </div>
                        <div class="view-switch" id="viewSwitch" role="group" aria-label="Report reading mode" hidden>
                            <button class="view-btn" type="button" data-view="module">模块阅读</button>
                            <button class="view-btn" type="button" data-view="full">完整报告</button>
                        </div>
                        <a class="archive-link" id="archiveLink" href="#" hidden>上一版归档</a>
                    </div>
                </div>
                <h1 id="heroTitle">加载中...</h1>
                <h2 id="heroSubtitle"></h2>
                <div class="report-meta-info" id="heroMeta"></div>
                <div class="previous-report-preview" id="previousReportPreview" hidden></div>
                <div class="mode-notice" id="modeNotice" hidden></div>
            </header>
            <div id="markdownContent"></div>
        </article>
    </main>

    <script>
        const REPORTS_DATA_URL = '/invest/research/data/reports.json';
        const SUPPORTED_LANGS = ['zh', 'en'];
        const REPORT_VIEWS = ['module', 'full', 'previous'];
        const VIEW_LABELS = {
            zh: {
                moduleView: '模块阅读',
                fullReport: '完整报告',
                previousArchive: '上一版归档',
                previousMode: '正在查看上一版原文，不代表当前结论',
                moduleNavTitle: '研究模块',
                diffSummaryTitle: '模块变化对照',
                showPreviousDiff: '显示变化对照',
                hidePreviousDiff: '隐藏变化对照',
                previousModuleContent: '上一版模块内容',
                removedModule: '当前最新版已不保留该模块内容',
                noModuleContent: '该模块暂无内容',
                noPreviousModuleContent: '上一版没有对应模块内容',
                unchanged: '未变化',
                added: '新增',
                modified: '修改',
                removed: '移除',
                heading: '上一版原文',
                date: '日期',
                update: '更新',
                action: '打开上一版',
                noChanges: '本次对比无章节级差异。',
                currentContent: '最新内容',
                deletedContent: '上一版删除内容',
                deletedOnly: '上一版已移除内容',
            },
            en: {
                moduleView: 'Modules',
                fullReport: 'Full Report',
                previousArchive: 'Previous Archive',
                previousMode: 'Viewing the previous report, not the current conclusion',
                moduleNavTitle: 'Research Modules',
                diffSummaryTitle: 'Module Change Summary',
                showPreviousDiff: 'Show changes',
                hidePreviousDiff: 'Hide changes',
                previousModuleContent: 'Previous module content',
                removedModule: 'This module is not retained in the latest report',
                noModuleContent: 'No content in this module yet',
                noPreviousModuleContent: 'No matching previous module content',
                unchanged: 'Unchanged',
                added: 'Added',
                modified: 'Modified',
                removed: 'Removed',
                heading: 'Previous report',
                date: 'Date',
                update: 'Updated',
                action: 'Open previous',
                noChanges: 'No section-level changes were detected.',
                currentContent: 'Latest content',
                deletedContent: 'Deleted previous content',
                deletedOnly: 'Removed previous content',
            },
        };

        const REPORT_MODULES = [
            {
                id: 'overview',
                labels: { zh: '摘要与当前判断', en: 'Summary & Current View' },
                keywords: {
                    zh: ['执行摘要', '摘要', '更新', '重跑', '最新事实', '事实基础', '当前判断'],
                    en: ['executive summary', 'summary', 'update', 'rerun', 'fact base', 'current view'],
                },
            },
            {
                id: 'business',
                labels: { zh: '业务概览', en: 'Business Overview' },
                keywords: {
                    zh: ['业务概览', '业务画像', '商业模式', '分部', '做什么', '产品', '平台供应商'],
                    en: ['business overview', 'business model', 'segment', 'what', 'product', 'platform supplier'],
                },
            },
            {
                id: 'competition',
                labels: { zh: '行业与竞争位置', en: 'Industry & Competition' },
                keywords: {
                    zh: ['行业', '竞争', '护城河', '市场份额', '生态', '供应链', 'tam', '对手'],
                    en: ['industry', 'competition', 'competitive', 'competitor', 'moat', 'market share', 'ecosystem', 'supply chain', 'tam'],
                },
            },
            {
                id: 'financial',
                labels: { zh: '财务健康度', en: 'Financial Health' },
                keywords: {
                    zh: ['财务', '现金流', '资产负债', '营收', '利润', '毛利率', '红旗', '结果'],
                    en: ['financial', 'cash flow', 'balance sheet', 'revenue', 'earnings', 'margin', 'red flag', 'results'],
                },
            },
            {
                id: 'management',
                labels: { zh: '管理层评估', en: 'Management Assessment' },
                keywords: {
                    zh: ['管理层', '治理', '高管', '领导', 'ceo', '执行质量'],
                    en: ['management', 'governance', 'executive', 'ceo', 'execution quality'],
                },
            },
            {
                id: 'bullBear',
                labels: { zh: '牛熊论点', en: 'Bull & Bear Cases' },
                keywords: {
                    zh: ['牛市', '熊市', '乐观', '悲观', '上行', '下行', '看涨', '看空'],
                    en: ['bull', 'bear', 'upside', 'downside', 'positive case', 'negative case', 'steel-manned'],
                },
            },
            {
                id: 'uncertainties',
                labels: { zh: '关键不确定性', en: 'Key Uncertainties' },
                keywords: {
                    zh: ['不确定性', '论点失效', '失效条件', '风险边界'],
                    en: ['uncertainty', 'uncertainties', 'thesis-breaking', 'failure condition', 'risk boundary'],
                },
            },
            {
                id: 'valuation',
                labels: { zh: '估值分析', en: 'Valuation' },
                keywords: {
                    zh: ['估值', '倍数', '目标价', '公允价值', '定价'],
                    en: ['valuation', 'multiple', 'target price', 'fair value', 'pricing'],
                },
            },
            {
                id: 'catalysts',
                labels: { zh: '催化剂与监控', en: 'Catalysts & Monitoring' },
                keywords: {
                    zh: ['催化', '监测', '监控', '时间线', '指标', '清单'],
                    en: ['catalyst', 'monitoring', 'watchlist', 'timeline', 'checklist'],
                },
            },
            {
                id: 'conclusion',
                labels: { zh: '结论与复盘', en: 'Conclusion & Review' },
                keywords: {
                    zh: ['结论', '建议', '复盘', '综合'],
                    en: ['conclusion', 'recommendation', 'review', 'synthesis'],
                },
            },
            {
                id: 'appendix',
                labels: { zh: '附录与来源', en: 'Appendix & Sources' },
                keywords: {
                    zh: ['附录', '资料来源', '数据来源', '来源', '假设', '术语'],
                    en: ['appendix', 'sources', 'data source', 'assumption', 'glossary'],
                },
            },
        ];

        let currentReport = null;
        let currentLang = 'zh';
        let currentView = 'module';
        let currentModuleId = 'overview';
        let currentModuleDiffOpen = false;
        let reportsById = new Map();

        document.addEventListener('DOMContentLoaded', async () => {
            await loadReport();
        });

        async function loadReport() {
            try {
                const params = new URLSearchParams(window.location.search);
                const reportId = params.get('id');
                const requestedLang = params.get('lang');
                const requestedView = params.get('view');
                const requestedModule = params.get('module');
                const requestedDiff = params.get('diff');
                if (!reportId) {
                    throw new Error('缺少报告 id 参数');
                }

                const reportsResponse = await fetch(REPORTS_DATA_URL, { cache: 'no-store' });
                if (!reportsResponse.ok) {
                    throw new Error(`加载 reports.json 失败: HTTP ${reportsResponse.status}`);
                }

                const reports = await reportsResponse.json();
                if (!Array.isArray(reports)) {
                    throw new Error('reports.json 不是有效数组');
                }

                reportsById = new Map(reports.map((item) => [item.id, item]));
                const report = reportsById.get(reportId);

                if (!report) {
                    throw new Error(`未找到报告: ${reportId}`);
                }
                if (!report.markdownFiles || typeof report.markdownFiles !== 'object') {
                    throw new Error(`报告缺少 markdownFiles 字段: ${reportId}`);
                }

                currentReport = report;
                currentLang = chooseLanguage(requestedLang, report.markdownFiles);
                currentView = chooseView(requestedView, report);
                currentModuleId = chooseModule(requestedModule);
                currentModuleDiffOpen = chooseModuleDiff(requestedView, requestedDiff, report);
                bindLanguageSwitch(report);
                bindViewSwitch(report);
                await renderReport();
            } catch (error) {
                console.error('Error loading report:', error);
                document.getElementById('heroTitle').textContent = '报告加载失败';
                document.getElementById('heroSubtitle').textContent = '';
                document.getElementById('heroMeta').innerHTML = '';
                document.getElementById('markdownContent').innerHTML =
                    `<p style="color: #d43f3a;">${escapeHtml(error.message)}。请返回<a href="/invest/research/">研报中心</a>重试。</p>`;
            }
        }

        function chooseLanguage(requestedLang, markdownFiles) {
            if (SUPPORTED_LANGS.includes(requestedLang) && markdownFiles[requestedLang]) {
                return requestedLang;
            }
            if (markdownFiles.zh) return 'zh';
            if (markdownFiles.en) return 'en';
            return 'zh';
        }

        function chooseView(requestedView, report) {
            if (requestedView === 'clean' || requestedView === 'diff') {
                return 'module';
            }
            if (REPORT_VIEWS.includes(requestedView)) {
                if (requestedView === 'previous' && !getPreviousReport(report)) {
                    return 'module';
                }
                return requestedView;
            }
            return 'module';
        }

        function chooseModule(requestedModule) {
            if (REPORT_MODULES.some((moduleDef) => moduleDef.id === requestedModule)) {
                return requestedModule;
            }
            return REPORT_MODULES[0].id;
        }

        function chooseModuleDiff(requestedView, requestedDiff, report) {
            if (!getPreviousReport(report)) {
                return false;
            }
            return requestedView === 'diff' || requestedDiff === '1' || requestedDiff === 'true';
        }

        function hasPreviousAnnualReport(report) {
            return !!(report && report.previousAnnualReport && report.previousAnnualReport.id);
        }

        function getPreviousReport(report) {
            if (!hasPreviousAnnualReport(report)) {
                return null;
            }
            const metadata = report.previousAnnualReport;
            const candidate = reportsById.get(metadata.id);
            if (!candidate || !candidate.markdownFiles) {
                return null;
            }
            return candidate;
        }

        function bindLanguageSwitch(report) {
            const root = document.getElementById('languageSwitch');
            if (!root) return;
            root.querySelectorAll('.lang-btn').forEach((button) => {
                const targetLang = button.dataset.lang;
                const available = !!(report.markdownFiles && report.markdownFiles[targetLang]);
                button.disabled = !available;

                button.onclick = async () => {
                    const targetLang = button.dataset.lang;
                    if (!SUPPORTED_LANGS.includes(targetLang) || targetLang === currentLang || !available) {
                        return;
                    }
                    currentLang = targetLang;
                    await renderReport();
                };
            });
        }

        function bindViewSwitch(report) {
            const root = document.getElementById('viewSwitch');
            if (!root) return;

            root.hidden = false;

            root.querySelectorAll('.view-btn').forEach((button) => {
                const requestedView = button.dataset.view;
                const labels = VIEW_LABELS[currentLang] || VIEW_LABELS.en;
                if (requestedView === 'module') {
                    button.textContent = labels.moduleView;
                } else if (requestedView === 'full') {
                    button.textContent = labels.fullReport;
                }

                button.onclick = async () => {
                    if (!REPORT_VIEWS.includes(requestedView) || requestedView === currentView) {
                        return;
                    }
                    currentView = requestedView;
                    currentModuleDiffOpen = false;
                    await renderReport();
                };
            });
        }

        async function renderReport() {
            const report = currentReport;
            if (!report) {
                throw new Error('未找到当前报告');
            }
            if (currentView === 'previous' && !getPreviousReport(report)) {
                currentView = 'module';
            }

            renderHero(report, currentLang);
            renderLanguageSwitch(report, currentLang);
            renderViewSwitch(report, currentLang);
            renderArchiveLink(report, currentLang);
            renderPreviousReportPreview(report, currentLang);
            await renderReportModeContent(report, currentLang);
            syncQuery();
        }

        async function renderReportModeContent(report, lang) {
            const previousReport = getPreviousReport(report);
            if (currentView === 'previous' && !previousReport) {
                currentView = 'module';
            }
            if (!previousReport) {
                currentModuleDiffOpen = false;
            }

            if (currentView === 'previous' && previousReport) {
                const previousMarkdown = await fetchReportMarkdown(previousReport, lang);
                const previousModules = buildReportModules(previousMarkdown, lang);
                renderModeNotice('previous', report, lang, previousReport);
                renderModuleReport(previousModules, lang, { mode: 'previous' });
                return;
            }

            if (currentView === 'full') {
                const markdown = await fetchReportMarkdown(report, lang);
                const currentModules = buildReportModules(markdown, lang);
                renderModeNotice('full', report, lang, previousReport);
                renderModuleReport(currentModules, lang, { mode: 'full' });
                return;
            }

            if (previousReport) {
                const [currentMarkdown, previousMarkdown] = await Promise.all([
                    fetchReportMarkdown(report, lang),
                    fetchReportMarkdown(previousReport, lang),
                ]);
                const diff = buildModuleDiff(currentMarkdown, previousMarkdown, lang);
                renderModeNotice('module', report, lang, previousReport);
                renderSingleModule(diff.modules, lang, {
                    mode: 'module',
                    includeDiff: currentModuleDiffOpen,
                });
                return;
            }

            const markdown = await fetchReportMarkdown(report, lang);
            const currentModules = buildReportModules(markdown, lang);
            renderModeNotice('module', report, lang, previousReport);
            renderSingleModule(currentModules, lang, { mode: 'module' });
        }

        async function fetchReportMarkdown(report, lang) {
            if (!report || !report.markdownFiles || !report.markdownFiles[lang]) {
                throw new Error(`未配置 ${lang} 版本内容`);
            }

            const response = await fetch(report.markdownFiles[lang], { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`加载 Markdown 失败: HTTP ${response.status}`);
            }
            return response.text();
        }

        function renderModeNotice(mode, report, lang, previousReport) {
            const root = document.getElementById('modeNotice');
            if (!root) return;

            if (!getPreviousReport(report)) {
                root.hidden = true;
                root.innerHTML = '';
                return;
            }

            const labels = VIEW_LABELS[lang] || VIEW_LABELS.en;
            if (mode === 'previous') {
                root.hidden = false;
                const previousLabel = previousReport
                    ? (lang === 'en'
                        ? (previousReport.titleEn || previousReport.title)
                        : (previousReport.title || previousReport.titleEn))
                    : '';
                root.textContent = `${labels.previousMode}${previousLabel ? `：${previousLabel}` : ''}`;
                return;
            }

            root.hidden = true;
            root.innerHTML = '';
        }

        function renderModuleReport(modules, lang, options = {}) {
            const markdownContent = document.getElementById('markdownContent');
            const visibleModules = modules.filter((module) => module.hasContent);
            markdownContent.innerHTML = visibleModules.length
                ? visibleModules.map((module) => renderReportModule(module, lang, options)).join('')
                : `<div class="diff-empty">${escapeHtml((VIEW_LABELS[lang] || VIEW_LABELS.en).noModuleContent)}</div>`;
            renderModuleNavigation(modules, lang);
            addSmoothScrolling();
        }

        function renderSingleModule(modules, lang, options = {}) {
            const markdownContent = document.getElementById('markdownContent');
            const selectedModule = getSelectedModule(modules);
            if (!selectedModule) {
                markdownContent.innerHTML = `<div class="diff-empty">${escapeHtml((VIEW_LABELS[lang] || VIEW_LABELS.en).noModuleContent)}</div>`;
                renderModuleNavigation(modules, lang);
                return;
            }

            currentModuleId = selectedModule.id;
            markdownContent.innerHTML = renderReportModule(selectedModule.current || selectedModule, lang, {
                ...options,
                moduleDef: selectedModule,
                previous: selectedModule.previous,
                status: selectedModule.status,
                allowDiff: !!selectedModule.previous,
                includeDiff: !!options.includeDiff,
            });
            renderModuleNavigation(modules, lang);
            bindModuleDiffToggle();
        }

        function getSelectedModule(modules) {
            const selected = (modules || []).find((module) => module.id === currentModuleId && module.hasContent);
            if (selected) {
                return selected;
            }
            const firstAvailable = (modules || []).find((module) => module.hasContent);
            return firstAvailable || null;
        }

        function renderReportModule(module, lang, options = {}) {
            const labels = VIEW_LABELS[lang] || VIEW_LABELS.en;
            const statusLabelMap = {
                added: labels.added,
                modified: labels.modified,
                removed: labels.removed,
                unchanged: labels.unchanged,
            };
            const mode = options.mode || 'clean';
            const moduleDef = options.moduleDef || module;
            const title = getModuleLabel(moduleDef, lang);
            const status = options.status || 'clean';
            const previous = options.previous;
            const showStatus = (mode === 'diff' || options.allowDiff) && status && !['clean', 'empty'].includes(status);
            const statusText = statusLabelMap[status] || status;
            const sectionsHtml = module && module.hasContent
                ? module.sections.map((section) => renderModuleSection(section, lang)).join('')
                : `<p class="diff-empty">${escapeHtml(labels.removedModule)}</p>`;
            const showDiffToggle = options.allowDiff && currentView === 'module';
            const diffToggle = showDiffToggle
                ? `<button class="module-diff-toggle${options.includeDiff ? ' active' : ''}" type="button" id="moduleDiffToggle">
                    ${escapeHtml(options.includeDiff ? labels.hidePreviousDiff : labels.showPreviousDiff)}
                </button>`
                : '';
            const diffPanel = showDiffToggle && options.includeDiff
                ? renderModuleDiffPanel(previous, lang)
                : '';

            return `
                <section class="report-module report-module-${status}" id="module-${escapeHtml(moduleDef.id)}">
                    <header class="module-header">
                        <div>
                            <div class="module-kicker">${escapeHtml(moduleDef.number || '')}</div>
                            <h2>${escapeHtml(title)}</h2>
                        </div>
                        <div class="module-header-actions">
                            ${showStatus ? `<span class="revision-status">${escapeHtml(statusText)}</span>` : ''}
                            ${diffToggle}
                        </div>
                    </header>
                    <div class="module-body">${sectionsHtml}</div>
                    ${diffPanel}
                </section>
            `;
        }

        function renderModuleSection(section, lang) {
            if (!section || !section.content) {
                return '';
            }
            if (section.isIntro) {
                return `<div class="module-section module-section-intro">${renderSectionBody(section.content, lang)}</div>`;
            }
            const tagName = section.level >= 3 ? 'h4' : 'h3';
            return `
                <section class="module-section">
                    <${tagName}>${escapeHtml(section.title)}</${tagName}>
                    ${renderSectionBody(section.content, lang)}
                </section>
            `;
        }

        function renderModuleDiffPanel(previousModule, lang) {
            const labels = VIEW_LABELS[lang] || VIEW_LABELS.en;
            if (!previousModule || !previousModule.hasContent) {
                return `<div class="module-diff-panel"><p class="diff-empty">${escapeHtml(labels.noPreviousModuleContent)}</p></div>`;
            }
            return `
                <div class="module-diff-panel">
                    <div class="revision-deleted">
                        <div class="revision-deleted-label">${escapeHtml(labels.previousModuleContent)}</div>
                        <del class="revision-deleted-content">
                            ${previousModule.sections.map((section) => renderModuleSection(section, lang)).join('')}
                        </del>
                    </div>
                </div>
            `;
        }

        function bindModuleDiffToggle() {
            const button = document.getElementById('moduleDiffToggle');
            if (!button) {
                return;
            }
            button.onclick = async () => {
                currentModuleDiffOpen = !currentModuleDiffOpen;
                await renderReport();
            };
        }

        function renderSectionBody(content, lang) {
            const labels = VIEW_LABELS[lang] || VIEW_LABELS.en;
            if (!content || !content.trim()) {
                return `<p class="diff-empty">${content ? '' : escapeHtml(labels.noModuleContent)}</p>`;
            }
            marked.setOptions({
                breaks: true,
                gfm: true
            });
            return marked.parse(content);
        }

        function syncQuery() {
            const params = new URLSearchParams(window.location.search);
            params.set('id', currentReport.id);
            params.set('lang', currentLang);
            if (currentView === 'full' || currentView === 'previous') {
                params.set('view', currentView);
                params.delete('module');
                params.delete('diff');
            } else {
                params.delete('view');
                params.set('module', currentModuleId);
                if (currentModuleDiffOpen) {
                    params.set('diff', '1');
                } else {
                    params.delete('diff');
                }
            }
            const nextUrl = `${window.location.pathname}?${params.toString()}`;
            window.history.replaceState({}, '', nextUrl);
        }

        function renderHero(report, lang) {
            const heroTitle = document.getElementById('heroTitle');
            const heroSubtitle = document.getElementById('heroSubtitle');
            const heroMeta = document.getElementById('heroMeta');

            const title = lang === 'en'
                ? (report.titleEn || report.title || report.company)
                : (report.title || report.titleZh || report.company);
            heroTitle.textContent = title || '研究报告';
            heroSubtitle.textContent = report.company || '';
            document.title = `${title || 'Research Report'} | Invest`;

            const labels = lang === 'en'
                ? { date: 'Date', ticker: 'Ticker', update: 'Updated' }
                : { date: '报告日期', ticker: '标的', update: '更新' };
            const metaItems = [
                report.date ? `${labels.date} ${report.date}` : null,
                report.ticker ? `${labels.ticker} ${report.ticker}` : null,
                report.lastUpdate ? `${labels.update} ${report.lastUpdate}` : null
            ].filter(Boolean);

            heroMeta.innerHTML = metaItems.map((item) => `<span>${item}</span>`).join('');
        }

        function renderViewSwitch(report, lang) {
            const root = document.getElementById('viewSwitch');
            if (!root) return;
            const labels = VIEW_LABELS[lang] || VIEW_LABELS.en;

            if (!getPreviousReport(report)) {
                root.hidden = true;
                return;
            }

            root.hidden = false;
            root.querySelectorAll('.view-btn').forEach((button) => {
                const requestedView = button.dataset.view;
                if (requestedView === 'module') {
                    button.textContent = labels.moduleView;
                } else if (requestedView === 'full') {
                    button.textContent = labels.fullReport;
                }
                button.classList.toggle('active', button.dataset.view === currentView);
            });
        }

        function renderArchiveLink(report, lang) {
            const root = document.getElementById('archiveLink');
            if (!root) return;

            const previous = getPreviousReport(report);
            if (!previous) {
                root.hidden = true;
                root.removeAttribute('href');
                return;
            }

            const metadata = report.previousAnnualReport || {};
            const labels = VIEW_LABELS[lang] || VIEW_LABELS.en;
            const previousFile = metadata.file || previous.file || `/invest/research/reports/view.html?id=${previous.id}`;
            root.hidden = false;
            root.href = withLang(previousFile, lang);
            root.textContent = labels.previousArchive;
        }

        function withLang(url, lang) {
            try {
                const parsedUrl = new URL(url, window.location.origin);
                parsedUrl.searchParams.set('lang', lang);
                return `${parsedUrl.pathname}?${parsedUrl.searchParams.toString()}`;
            } catch (error) {
                return url;
            }
        }

        function renderPreviousReportPreview(report, lang) {
            const root = document.getElementById('previousReportPreview');
            if (!root) return;

            root.hidden = true;
            root.innerHTML = '';
        }

        function renderLanguageSwitch(report, lang) {
            const root = document.getElementById('languageSwitch');
            if (!root) return;
            root.querySelectorAll('.lang-btn').forEach((button) => {
                const buttonLang = button.dataset.lang;
                const available = !!(report.markdownFiles && report.markdownFiles[buttonLang]);
                button.disabled = !available;
                button.classList.toggle('active', buttonLang === lang);
            });
        }

        function stripMarkdownCover(markdown) {
            const normalized = String(markdown || '').replace(/^\uFEFF?/, '').replace(/\r\n/g, '\n');
            const withoutTitle = normalized.replace(/^#\s+.*(?:\n+|$)/, '');
            const coverMatch = withoutTitle.match(/^([\s\S]*?)\n---\s*\n+/);
            if (!coverMatch) {
                return withoutTitle;
            }

            const coverLines = coverMatch[1]
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean);
            const coverKeys = [
                '标的收录日期',
                '最近更新日期',
                '代码',
                '免责声明',
                'Coverage date',
                'Last updated',
                'Ticker',
                'Disclaimer',
            ];
            const isCoverMetadata = coverLines.length > 0
                && coverLines.length <= 8
                && coverLines.every((line) => coverKeys.some((key) => line.startsWith(`${key}：`) || line.startsWith(`${key}:`)));

            return isCoverMetadata ? withoutTitle.slice(coverMatch[0].length) : withoutTitle;
        }

        function splitMarkdownSections(markdown, lang) {
            const lines = stripMarkdownCover(markdown).split('\n');
            const sections = [];
            let currentSection = null;
            let parentModuleKey = 'overview';
            const introBuffer = [];
            const bodyBuffer = [];
            let sectionIndex = 0;

            const commitIntro = () => {
                const content = introBuffer.join('\n').trim();
                if (content) {
                    sections.push({
                        id: `intro-${sectionIndex}`,
                        title: lang === 'en' ? 'Introduction' : '基础信息',
                        level: 0,
                        moduleKey: 'overview',
                        content,
                        isIntro: true,
                    });
                    sectionIndex += 1;
                }
                introBuffer.length = 0;
            };

            const commitCurrent = () => {
                if (!currentSection) {
                    return;
                }
                const content = bodyBuffer.join('\n').trim();
                if (content) {
                    currentSection.content = content;
                    sections.push(currentSection);
                }
                currentSection = null;
                bodyBuffer.length = 0;
            };

            lines.forEach((line) => {
                const headingMatch = line.match(/^(#{2,3})\s+(.*)$/);
                if (!headingMatch) {
                    if (currentSection) {
                        bodyBuffer.push(line);
                    } else if (line.trim()) {
                        introBuffer.push(line);
                    }
                    return;
                }

                const isH2 = headingMatch[1] === '##';
                const isH3 = headingMatch[1] === '###';
                if (!isH2 && !isH3) {
                    if (currentSection) {
                        bodyBuffer.push(line);
                    } else if (line.trim()) {
                        introBuffer.push(line);
                    }
                    return;
                }

                if (currentSection) {
                    commitCurrent();
                }
                commitIntro();

                const title = headingMatch[2].trim();
                const ownModuleKey = resolveModuleKey(title, lang);
                if (isH2) {
                    parentModuleKey = ownModuleKey || 'overview';
                }
                const moduleKey = isH3
                    ? (parentModuleKey && parentModuleKey !== 'overview'
                        ? parentModuleKey
                        : (ownModuleKey || parentModuleKey || 'overview'))
                    : (ownModuleKey || 'overview');

                currentSection = {
                    id: `section-${sectionIndex}`,
                    title,
                    moduleKey,
                    level: isH2 ? 2 : 3,
                    content: '',
                };
                sectionIndex += 1;
            });

            commitCurrent();
            commitIntro();
            return sections;
        }

        function resolveModuleKey(title, lang) {
            const text = String(title || '').toLowerCase();
            for (const moduleDef of REPORT_MODULES) {
                const keywords = moduleDef.keywords[lang] || moduleDef.keywords.en || [];
                if (keywords.some((keyword) => text.includes(String(keyword).toLowerCase()))) {
                    return moduleDef.id;
                }
            }
            return null;
        }

        function buildReportModules(markdown, lang) {
            const moduleMap = new Map(REPORT_MODULES.map((moduleDef, index) => [
                moduleDef.id,
                {
                    ...moduleDef,
                    number: String(index + 1).padStart(2, '0'),
                    sections: [],
                    hasContent: false,
                },
            ]));

            splitMarkdownSections(markdown, lang).forEach((section) => {
                const moduleKey = moduleMap.has(section.moduleKey) ? section.moduleKey : 'overview';
                moduleMap.get(moduleKey).sections.push(section);
            });

            return REPORT_MODULES.map((moduleDef) => {
                const module = moduleMap.get(moduleDef.id);
                module.hasContent = module.sections.some((section) => !!(section.content && section.content.trim()));
                return module;
            });
        }

        function normalizeSectionContent(content) {
            return String(content || '')
                .replace(/\r/g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase();
        }

        function normalizeModuleContent(module) {
            if (!module || !module.hasContent) {
                return '';
            }
            return normalizeSectionContent(module.sections
                .map((section) => `${section.title}\n${section.content}`)
                .join('\n\n'));
        }

        function buildModuleDiff(currentMarkdown, previousMarkdown, lang) {
            const currentModules = buildReportModules(currentMarkdown, lang);
            const previousModules = buildReportModules(previousMarkdown, lang);
            const previousMap = new Map(previousModules.map((module) => [module.id, module]));
            const counts = { added: 0, modified: 0, removed: 0, unchanged: 0 };
            const modules = currentModules.map((currentModule) => {
                const previousModule = previousMap.get(currentModule.id);
                let status = 'empty';
                if (currentModule.hasContent && (!previousModule || !previousModule.hasContent)) {
                    status = 'added';
                } else if (!currentModule.hasContent && previousModule && previousModule.hasContent) {
                    status = 'removed';
                } else if (currentModule.hasContent && previousModule && previousModule.hasContent) {
                    status = normalizeModuleContent(currentModule) === normalizeModuleContent(previousModule)
                        ? 'unchanged'
                        : 'modified';
                }
                if (status !== 'empty') {
                    counts[status] += 1;
                }
                return {
                    ...currentModule,
                    current: currentModule,
                    previous: previousModule,
                    status,
                    hasContent: currentModule.hasContent || !!(previousModule && previousModule.hasContent),
                };
            });

            return { modules, counts };
        }

        function getModuleLabel(moduleDef, lang) {
            if (!moduleDef || !moduleDef.labels) {
                return lang === 'en' ? 'Module' : '模块';
            }
            return moduleDef.labels[lang] || moduleDef.labels.en || moduleDef.id;
        }

        function renderModuleNavigation(modules, lang) {
            const toc = document.getElementById('tableOfContents');
            const tocHeader = document.getElementById('tocHeader');
            const labels = VIEW_LABELS[lang] || VIEW_LABELS.en;
            const moduleState = new Map((modules || []).map((module) => [module.id, module]));

            if (!toc) {
                return;
            }
            if (tocHeader) {
                tocHeader.textContent = labels.moduleNavTitle;
            }

            let tocHTML = '<ol class="module-nav-list">';
            REPORT_MODULES.forEach((moduleDef, index) => {
                const state = moduleState.get(moduleDef.id) || moduleDef;
                const number = state.number || String(index + 1).padStart(2, '0');
                const label = getModuleLabel(moduleDef, lang);
                const hasContent = !!state.hasContent;
                const statusClass = state.status ? ` module-status-${state.status}` : '';
                const activeClass = currentView === 'module' && moduleDef.id === currentModuleId ? ' active' : '';
                const itemContent = `
                    <span class="module-nav-number">${escapeHtml(number)}</span>
                    <span class="module-nav-label">${escapeHtml(label)}</span>
                `;
                tocHTML += `<li class="module-nav-item${hasContent ? '' : ' module-nav-missing'}${statusClass}${activeClass}">`;
                tocHTML += hasContent
                    ? `<button type="button" data-module="${escapeHtml(moduleDef.id)}">${itemContent}</button>`
                    : `<span>${itemContent}</span>`;
                tocHTML += '</li>';
            });
            tocHTML += '</ol>';
            toc.innerHTML = tocHTML;
            bindModuleNavigation();
        }

        function bindModuleNavigation() {
            const toc = document.getElementById('tableOfContents');
            if (!toc) {
                return;
            }
            toc.querySelectorAll('button[data-module]').forEach((button) => {
                button.onclick = async () => {
                    const moduleId = button.dataset.module;
                    if (!REPORT_MODULES.some((moduleDef) => moduleDef.id === moduleId)) {
                        return;
                    }
                    currentView = 'module';
                    currentModuleId = moduleId;
                    currentModuleDiffOpen = false;
                    await renderReport();
                };
            });
        }

        function addSmoothScrolling() {
            document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
                anchor.addEventListener('click', function (event) {
                    event.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
    <script src="/shared/theme-switcher.js"></script>
</body>
