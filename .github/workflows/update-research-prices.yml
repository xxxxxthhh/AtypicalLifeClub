name: Update Research Prices

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch latest research prices
        run: python3 static/invest/research/update_prices.py

      - name: Validate research prices
        run: python3 static/invest/research/validate_prices.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add static/invest/research/data/prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update research price data - $(date +'%Y-%m-%d')" && git push)
